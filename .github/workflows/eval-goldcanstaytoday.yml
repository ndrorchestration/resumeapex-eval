name: Goldcanstaytoday Eval

on:
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sunday
  workflow_dispatch:       # Manual trigger

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Goldcanstaytoday eval (scaffold)
      run: python eval/goldcanstaytoday_eval.py --data datasets/resumeapex_dataset1.json || echo 'Dataset pending; scaffold verified'
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: goldcanstaytoday-results
        path: runlogs/*.jsonl
        if-no-files-found: warn
